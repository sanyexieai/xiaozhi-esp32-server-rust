mcp:
  global:
    enabled: true
    servers:
    - name: filesystem
      url: http://localhost:3001/sse
      type: sse
      enabled: true
    - name: memory
      url: http://localhost:3002/mcp
      type: streamablehttp
      enabled: true
    reconnect_interval: 300
    max_reconnect_attempts: 10
  device:
    enabled: true
    websocket_path: /xiaozhi/mcp/
    max_connections_per_device: 5
local_mcp:
  exit_conversation: true
  clear_conversation_history: true
memory:
  provider: nomemo
  nomemo: null
  memobase:
    api_key: your_memobase_api_key_here
    api_version: v1
    base_url: https://api.memobase.dev
    enable_search: true
    search_threshold: 0.5
    search_top_k: 3
  mem0:
    api_key: your_mem0_api_key_here
    base_url: https://api.mem0.ai
    enable_search: true
    search_threshold: 0.5
    search_top_k: 3
