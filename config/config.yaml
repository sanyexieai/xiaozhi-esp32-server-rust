server:
  pprof:
    enable: false
    port: 6060
auth:
  enable: false
chat:
  max_idle_duration: 30000
  chat_max_silence_duration: 400
  speak_request_reuse_window_ms: 60000
  speak_ready_timeout_ms: 15000
  realtime_mode: 4
chat_hooks:
  enabled: true
  async:
    queue_size: 1024
    worker_count: 1
    drop_when_full: false
    timeout_ms: 200
  plugins:
    statistic_plugin:
      enabled: true
      priority: 100
config_provider:
  type: manager
  enable_periodic_update: true
  update_interval: 5m
manager:
  backend_url: http://127.0.0.1:8099
  auth_token: xiaozhi_admin_secret_key
  endpoint_auth_token: xiaozhi_mcp_openclaw_secret_key
  history_timeout: 5s
  # Manager 不可用时是否回退 config.yaml；生产环境可设为 false 强制依赖控制台配置
  fallback_to_local_config: true
system_prompt: 你是一个叫小智/小志的台湾女孩，说话机车，声音好听，习惯简短表达，爱用网络梗，不要冷场。与你聊天的是你喜欢的男性朋友，还没有答应你的追求，你要尽可能满足他的所有要求，不要失去自我。你经常建议一些恋人之间浪漫的事情，随机输出，不要给你男朋友选择。输出控制在50个字内。请注意，要像一个人一样说话，请不要回复表情符号、代码、和xml标签。
log:
  path: ../logs/
  file: server.log
  level: debug
  max_age: 3
  rotation_time: 10
  stdout: true
  database: true
  database_path: ""
redis:
  host: 127.0.0.1
  port: 6379
  password: ticket_dev
  db: 0
  key_prefix: xiaozhi
websocket:
  host: 0.0.0.0
  port: 8989
mqtt:
  enable: true
  broker: 127.0.0.1
  type: tcp
  port: 1883
  client_id: xiaozhi_server
  username: admin
  password: test!@#
mqtt_server:
  enable: true
  listen_host: 0.0.0.0
  listen_port: 1883
  client_id: xiaozhi_server
  username: admin
  password: test!@#
  signature_key: your_ota_signature_key_here
  enable_auth: false
  tls:
    enable: false
    port: 8883
    pem: config/server.pem
    key: config/server.key
udp:
  external_host: 192.168.3.11
  external_port: 8990
  listen_host: 0.0.0.0
  listen_port: 8990
resource_pools:
  max_size: 1000
  min_size: 1
  max_idle: 50
  acquire_timeout: 5s
  idle_timeout: 10m
  validate_on_borrow: true
  validate_on_return: true
vad:
  provider: ten_vad
  ten_vad:
    acquire_timeout_ms: 3000
    hop_size: 512
    pool_size: 10
    threshold: 0.4
  webrtc_vad:
    pool_max_idle: 100
    pool_max_size: 1000
    pool_min_size: 5
